networks:
  test:
    name: fabric_test
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"

services:
  #
  # Bootstrap Certificate Authority
  #
  boot-ca:
    image: hyperledger/fabric-ca:latest
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=boot-ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
      - FABRIC_CA_CLIENT_HOME=/etc/hyperledger/fabric-ca-client
    ports:
      - "7054:7054"
      - "17054:17054"
    #  - "127.0.0.1:7054:7054"
    #  - "127.0.0.1:17054:17054"
    volumes:
      - type: bind
        source: setup.sh
        target: /setup.sh
        read_only: false
    container_name: boot-ca
    command: sh -c 'chmod +x setup.sh; ./setup.sh'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /etc/hyperledger/fabric-ca-client/tls-ca/tlsadmin/msp/signcerts/cert.pem",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    # Keep the container alive so .http requests can initialize and start the CA on demand.
    # command: sh -c "tail -f /dev/null"
    networks:
      - test

  test-ca:
    image: hyperledger/fabric-ca:latest
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=test-ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:18054
      - FABRIC_CA_CLIENT_HOME=/etc/hyperledger/fabric-ca-client
    ports:
      - "8054:8054"
      - "18054:18054"
      # - "127.0.0.1:8054:8054"
      # - "127.0.0.1:18054:18054"
    container_name: test-ca
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    networks:
      - test
