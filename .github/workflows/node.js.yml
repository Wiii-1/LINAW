# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-slim]
        # Don't use Windows or Mac for CI to reduce costs
        # RHEL, openSUSE, and Debian aren't supported at GitHub Actions
        # Learn more about self-hosted runners at https://www.youtube.com/watch?v=aLHyPZO0Fy0
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend Install
        run: npm ci
        working-directory: backend

      - name: Backend Build
        run: npm run build --if-present
        working-directory: backend

      - name: Backend Test
        run: npm test --if-present
        working-directory: backend

  client:
    name: Client (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Client Install
        run: bun ci
        working-directory: client
      - name: Client Build
        run: bun run build
        working-directory: client
