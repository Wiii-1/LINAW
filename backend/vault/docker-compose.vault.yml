# this is just sample look I found, still don't know how to create a docker compose for vault :((

services:
    vault:
        image: vault:1.13.3
        container_name: linaw-vault
        restart: unless-stopped
        ports:
            - "8200:8200"
        environment:
            VAULT_ADDR: "http://0.0.0.0:8200"
            VAULT_API_ADDR: "http://0.0.0.0:8200"
        cap_add:
            - IPC_LOCK
        volumes:
            - vault_data:/vault/data
            - ./vault/config:/vault/config
        command: vault server -config=/vault/config/vault.hcl
        healthcheck:
            test: [ "CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    vault_data:
